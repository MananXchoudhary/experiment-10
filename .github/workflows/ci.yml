# Part (a): CI Workflow
# Runs on every push to any branch
# Installs dependencies and runs npm test to verify the build

name: CI - Run Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Install & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react-firebase-app/package-lock.json

      - name: Install dependencies
        working-directory: react-firebase-app
        run: npm ci

      - name: Run tests
        working-directory: react-firebase-app
        run: npm test
